services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/portfolio.db
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
    disk:
      name: portfolio-data
      mountPath: /opt/render/project/src
      sizeGB: 1
