services:
  - type: web
    name: portfolio-backend
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-1.0.0.jar
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: portfolio-data
      mountPath: /opt/render/project/src
      sizeGB: 1
