# --- Server ---
# Render (and most cloud hosts) set PORT automatically - falls back to 4000 locally.
server.port=${PORT:4000}

# --- Database (SQLite file) ---
# DB_PATH lets you point this at a persistent disk in production
# (e.g. Render's mounted disk). Defaults to a local file for dev.
spring.datasource.url=jdbc:sqlite:${DB_PATH:portfolio.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate dialect for SQLite (from hibernate-community-dialects)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Auto create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- File upload limits ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Where uploaded project images are stored on disk
# UPLOAD_DIR lets you point this at a persistent disk in production.
app.upload.dir=${UPLOAD_DIR:uploads}

# --- Admin auth ---
# Password required (via X-Admin-Password header) to add/delete projects.
# Set the ADMIN_PASSWORD environment variable on your machine/server.
# Falls back to "changeme123" only for local dev convenience - CHANGE THIS
# before deploying publicly, by setting a real ADMIN_PASSWORD env var.
app.admin.password=${ADMIN_PASSWORD:changeme123}

# --- CORS ---
# Comma-separated list of frontend URLs allowed to call this API.
# In production set FRONTEND_URL to your deployed frontend's exact URL,
# e.g. FRONTEND_URL=https://your-portfolio.vercel.app
app.frontend.urls=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
