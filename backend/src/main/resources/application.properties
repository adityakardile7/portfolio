# --- Server ---
# Render (and most cloud hosts) set PORT automatically - falls back to 4000 locally.
server.port=${PORT:4000}

# --- Database ---
# Production: set DATABASE_URL to your Neon (or any) Postgres connection
# string, e.g. jdbc:postgresql://<host>/<db>?user=<user>&password=<pw>&sslmode=require
# Local dev: if DATABASE_URL is not set, falls back to an embedded H2
# database (a file created automatically, zero setup, Java-only - no
# separate database server needed to run this on your laptop).
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./portfolio-local-db}

# Auto create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- File upload limits (for the multipart request itself, before
# the file is forwarded to Cloudinary) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Cloudinary (persistent image hosting) ---
# Sign up free at cloudinary.com, then copy these 3 values from your
# dashboard. Required in production; local dev works without them
# (image upload will just be skipped/no-op if left blank).
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- Admin auth ---
# Password required (via X-Admin-Password header) to add/delete projects.
# Set the ADMIN_PASSWORD environment variable on your machine/server.
# Falls back to "changeme123" only for local dev convenience - CHANGE THIS
# before deploying publicly, by setting a real ADMIN_PASSWORD env var.
app.admin.password=${ADMIN_PASSWORD:changeme123}

# --- CORS ---
# Comma-separated list of frontend URLs allowed to call this API.
# In production set FRONTEND_URL to your deployed frontend's exact URL,
# e.g. FRONTEND_URL=https://your-portfolio.vercel.app
app.frontend.urls=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
